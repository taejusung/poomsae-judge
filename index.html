<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 품새 심판 v7</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080c14;color:#fff;font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
.wrap{display:flex;flex-direction:column;align-items:center;padding:14px;gap:12px;}
.title{font-family:'Black Han Sans',sans-serif;font-size:22px;letter-spacing:2px;
  background:linear-gradient(90deg,#818cf8,#c084fc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.camera-box{position:relative;width:100%;max-width:640px;
  background:#000;border-radius:16px;overflow:hidden;border:2px solid #312e81;}
#video{width:100%;height:auto;display:block;}
#canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
#status-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.93);
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;z-index:100;padding:20px;gap:14px;}
.loader{width:40px;height:40px;border:3px solid rgba(99,102,241,0.2);
  border-top-color:#818cf8;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.status-text{font-size:14px;color:#818cf8;line-height:1.9;}
.status-sub{font-size:11px;color:rgba(255,255,255,0.3);}
.detect-badges{position:absolute;top:10px;left:0;right:0;
  display:flex;justify-content:space-between;padding:0 10px;z-index:10;pointer-events:none;}
.detect-badge{padding:5px 12px;border-radius:20px;font-family:'Black Han Sans',sans-serif;
  font-size:12px;transition:all 0.3s;}
.detect-badge.blue{background:rgba(59,130,246,0.3);border:1.5px solid rgba(59,130,246,0.5);color:#93c5fd;}
.detect-badge.red{background:rgba(239,68,68,0.3);border:1.5px solid rgba(239,68,68,0.5);color:#fca5a5;}
.detect-badge.found{background:rgba(74,222,128,0.3);border-color:#4ade80;color:#4ade80;}
#lock-overlay{position:absolute;inset:0;display:none;flex-direction:column;
  justify-content:flex-end;align-items:center;padding-bottom:16px;z-index:20;
  background:linear-gradient(transparent 50%,rgba(0,0,0,0.65) 100%);}
.lock-btn{padding:14px 40px;border-radius:50px;background:rgba(251,191,36,0.95);
  border:none;color:#000;font-family:'Black Han Sans',sans-serif;font-size:16px;
  letter-spacing:2px;cursor:pointer;animation:pulse 1s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.phase-bar{width:100%;max-width:640px;display:flex;gap:6px;}
.phase-step{flex:1;padding:8px;border-radius:8px;text-align:center;
  font-family:'Black Han Sans',sans-serif;font-size:11px;letter-spacing:1px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.3);transition:all 0.3s;}
.phase-step.active{background:rgba(99,102,241,0.3);border-color:#818cf8;color:#c7d2fe;}
.phase-step.done{background:rgba(74,222,128,0.15);border-color:#4ade80;color:#4ade80;}
.score-board{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:640px;}
.score-panel{border-radius:14px;padding:14px;text-align:center;display:flex;flex-direction:column;gap:5px;}
.score-panel.blue{background:rgba(59,130,246,0.12);border:1.5px solid rgba(59,130,246,0.45);}
.score-panel.red{background:rgba(239,68,68,0.12);border:1.5px solid rgba(239,68,68,0.45);}
.corner-label{font-size:11px;letter-spacing:1px;}
.blue .corner-label{color:#60a5fa;}.red .corner-label{color:#fb7185;}
.big-score{font-family:'Black Han Sans',sans-serif;font-size:44px;}
.blue .big-score{color:#60a5fa;}.red .big-score{color:#fb7185;}
.items-row{display:flex;flex-direction:column;gap:3px;margin-top:4px;}
.item-row{display:flex;justify-content:space-between;font-size:10px;}
.item-name{color:rgba(255,255,255,0.45);}.item-val{font-weight:700;}
.blue .item-val{color:#93c5fd;}.red .item-val{color:#fca5a5;}
.btn-row{display:flex;gap:10px;width:100%;max-width:640px;}
.btn{flex:1;padding:14px;border-radius:12px;border:none;
  font-family:'Black Han Sans',sans-serif;font-size:15px;letter-spacing:1px;
  cursor:pointer;transition:all 0.2s;opacity:0.4;pointer-events:none;}
.btn.active{opacity:1;pointer-events:all;}
.btn-start{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;}
.btn-start.recording{background:linear-gradient(135deg,#be123c,#e11d48);}
.btn-reset{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);
  border:1px solid rgba(255,255,255,0.15);opacity:1;pointer-events:all;}
.result-bar{width:100%;max-width:640px;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px;
  text-align:center;font-family:'Black Han Sans',sans-serif;font-size:18px;
  letter-spacing:2px;min-height:52px;}
.debug{font-size:10px;color:rgba(255,255,255,0.25);text-align:center;padding:2px 0;}
</style>
</head>
<body>
<div class="wrap">
  <div class="title">🥋 AI 품새 심판</div>
  <div class="phase-bar">
    <div class="phase-step active" id="phase0">① 준비</div>
    <div class="phase-step" id="phase1">② 위치확인</div>
    <div class="phase-step" id="phase2">③ 고정</div>
    <div class="phase-step" id="phase3">④ 측정</div>
  </div>
  <div class="camera-box">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="detect-badges">
      <div class="detect-badge blue" id="badgeLeft">🔵 청 대기</div>
      <div class="detect-badge red" id="badgeRight">🔴 홍 대기</div>
    </div>
    <div id="lock-overlay">
      <button class="lock-btn" onclick="lockPositions()">📌 이 위치로 고정!</button>
    </div>
    <div id="status-overlay">
      <div class="loader"></div>
      <div class="status-text" id="statusText">AI 엔진 로딩 중...<br>MoveNet 2인 인식 모델 준비 중</div>
      <div class="status-sub" id="statusSub">TensorFlow.js 로딩 중 (10~20초)</div>
    </div>
  </div>
  <div class="score-board">
    <div class="score-panel blue">
      <div class="corner-label">🔵 청 코너 (왼쪽)</div>
      <div class="big-score" id="score0">-</div>
      <div class="items-row">
        <div class="item-row"><span class="item-name">자세</span><span class="item-val" id="i0_0">-</span></div>
        <div class="item-row"><span class="item-name">서기</span><span class="item-val" id="i0_1">-</span></div>
        <div class="item-row"><span class="item-name">균형</span><span class="item-val" id="i0_2">-</span></div>
        <div class="item-row"><span class="item-name">파워</span><span class="item-val" id="i0_3">-</span></div>
      </div>
    </div>
    <div class="score-panel red">
      <div class="corner-label">🔴 홍 코너 (오른쪽)</div>
      <div class="big-score" id="score1">-</div>
      <div class="items-row">
        <div class="item-row"><span class="item-name">자세</span><span class="item-val" id="i1_0">-</span></div>
        <div class="item-row"><span class="item-name">서기</span><span class="item-val" id="i1_1">-</span></div>
        <div class="item-row"><span class="item-name">균형</span><span class="item-val" id="i1_2">-</span></div>
        <div class="item-row"><span class="item-name">파워</span><span class="item-val" id="i1_3">-</span></div>
      </div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-start" id="recordBtn" onclick="toggleRecord()">⚔️ 측정 시작</button>
    <button class="btn btn-reset" onclick="resetAll()">🔄 처음부터</button>
  </div>
  <div class="result-bar" id="resultBar">① 두 선수가 화면 좌우에 서주세요</div>
  <div class="debug" id="debugMsg">초기화 중...</div>
</div>

<!-- TensorFlow.js + MoveNet -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.10.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.10.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

<script>
const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

let phase='loading';
let isRecording=false;
let detector=null;
let rafId=null;

let personLM=[null,null];
let prevLM=[null,null];
let lastScore=[
  {post:2.0,stance:1.5,balance:1.5,power:0.5},
  {post:2.0,stance:1.5,balance:1.5,power:0.5}
];
let scoreAccum=[
  {post:[],stance:[],balance:[],power:[]},
  {post:[],stance:[],balance:[],power:[]}
];
let framesSinceMotion=[0,0];
let detectedLeft=false,detectedRight=false;

// MoveNet 키포인트 인덱스
const KP={
  nose:0,leftEye:1,rightEye:2,leftEar:3,rightEar:4,
  leftShoulder:5,rightShoulder:6,leftElbow:7,rightElbow:8,
  leftWrist:9,rightWrist:10,leftHip:11,rightHip:12,
  leftKnee:13,rightKnee:14,leftAnkle:15,rightAnkle:16
};

const BONES=[
  [KP.leftShoulder,KP.rightShoulder],
  [KP.leftShoulder,KP.leftElbow],[KP.leftElbow,KP.leftWrist],
  [KP.rightShoulder,KP.rightElbow],[KP.rightElbow,KP.rightWrist],
  [KP.leftShoulder,KP.leftHip],[KP.rightShoulder,KP.rightHip],
  [KP.leftHip,KP.rightHip],
  [KP.leftHip,KP.leftKnee],[KP.leftKnee,KP.leftAnkle],
  [KP.rightHip,KP.rightKnee],[KP.rightKnee,KP.rightAnkle],
];

async function init(){
  setStatus('TensorFlow.js 로딩 중...','잠시만 기다려주세요');

  // tf 준비 대기
  await waitFor(()=>window.tf, 15000, 'TensorFlow.js');
  await tf.ready();
  setStatus('MoveNet 모델 로딩 중...','2인 동시 인식 모델');

  // poseDetection 준비 대기
  await waitFor(()=>window.poseDetection, 15000, 'poseDetection');

  try{
    // MoveNet MultiPose Lightning — 2인 이상 동시 인식
    detector = await poseDetection.createDetector(
      poseDetection.SupportedModels.MoveNet,{
        modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING,
        enableSmoothing: true,
        minPoseScore: 0.25,
      }
    );
    document.getElementById('debugMsg').textContent='✅ MoveNet MultiPose 2인 인식 가동!';
    setStatus('카메라 연결 중...','후방 카메라 활성화');
    await setupCamera();
    startDetectionLoop();
  }catch(e){
    document.getElementById('debugMsg').textContent='❌ 모델 로드 실패: '+e.message;
    setStatus('⚠️ 모델 로드 실패','페이지를 새로고침 해주세요\n'+e.message);
  }
}

function waitFor(condition, timeout=15000, name=''){
  return new Promise((res,rej)=>{
    if(condition()){res();return;}
    const start=Date.now();
    const t=setInterval(()=>{
      if(condition()){clearInterval(t);res();}
      else if(Date.now()-start>timeout){
        clearInterval(t);
        rej(new Error(name+' 로딩 타임아웃'));
      }
    },200);
  });
}

async function setupCamera(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:640},height:{ideal:480}}
    });
    video.srcObject=stream;
    await new Promise(res=>{video.onloadedmetadata=res;});
    video.play();
    canvas.width=video.videoWidth||640;
    canvas.height=video.videoHeight||480;
    document.getElementById('status-overlay').style.display='none';
    setPhase('detecting');
    setResult('① 두 선수가 화면 좌우에 서주세요');
  }catch(err){
    setStatus('❌ 카메라 권한 없음','설정에서 카메라를 허용해주세요');
  }
}

// ── MoveNet 감지 루프
async function startDetectionLoop(){
  const loop=async()=>{
    if(video.readyState>=2&&detector){
      canvas.width=video.videoWidth;
      canvas.height=video.videoHeight;
      try{
        const poses=await detector.estimatePoses(video,{
          maxPoses:2,
          flipHorizontal:false,
          scoreThreshold:0.25,
        });
        processPoses(poses);
      }catch(e){}
    }
    rafId=requestAnimationFrame(loop);
  };
  loop();
}

function processPoses(poses){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  personLM=[null,null];

  if(!poses||poses.length===0){
    updateBadges(false,false);
    document.getElementById('debugMsg').textContent='인식 대기 중... 전신이 보이도록 서주세요';
    return;
  }

  // x좌표 기준 정렬 → 왼쪽=청(0), 오른쪽=홍(1)
  const sorted=[...poses].sort((a,b)=>{
    const ax=getKP(a,KP.leftShoulder).x+getKP(a,KP.rightShoulder).x;
    const bx=getKP(b,KP.leftShoulder).x+getKP(b,KP.rightShoulder).x;
    return ax-bx;
  });

  personLM[0]=sorted[0]||null;
  personLM[1]=sorted[1]||null;
  detectedLeft=!!personLM[0];
  detectedRight=!!personLM[1];

  if(personLM[0]) drawPose(personLM[0],'#3b82f6');
  if(personLM[1]) drawPose(personLM[1],'#ef4444');

  updateBadges(detectedLeft,detectedRight);

  if(phase==='detecting'&&detectedLeft&&detectedRight){
    document.getElementById('lock-overlay').style.display='flex';
    setResult('✅ 두 선수 인식 완료! 위치가 맞으면 고정 버튼을 누르세요');
  }

  if(isRecording){
    if(personLM[0]) scoreOnePerson(personLM[0],0);
    if(personLM[1]) scoreOnePerson(personLM[1],1);
    updateScoreUI();
  }

  document.getElementById('debugMsg').textContent=
    `감지: ${poses.length}명 | 청${detectedLeft?'✅':'❌'} 홍${detectedRight?'✅':'❌'} | MoveNet MultiPose`;
}

// MoveNet 키포인트 추출 (x,y,score)
function getKP(pose,idx){
  const kp=pose.keypoints[idx];
  return {x:kp.x/canvas.width, y:kp.y/canvas.height, score:kp.score||0};
}

// ── 스켈레톤 그리기
function drawPose(pose,color){
  const W=canvas.width,H=canvas.height;
  ctx.strokeStyle=color;ctx.lineWidth=3;ctx.fillStyle=color;

  BONES.forEach(([a,b])=>{
    const ka=pose.keypoints[a],kb=pose.keypoints[b];
    if(!ka||!kb)return;
    if((ka.score||0)<0.25||(kb.score||0)<0.25)return;
    ctx.beginPath();ctx.moveTo(ka.x,ka.y);ctx.lineTo(kb.x,kb.y);ctx.stroke();
  });

  pose.keypoints.forEach((kp,i)=>{
    if((kp.score||0)<0.25)return;
    ctx.beginPath();ctx.arc(kp.x,kp.y,i===0?8:5,0,Math.PI*2);ctx.fill();
  });
}

// ── 채점 (MoveNet 좌표는 픽셀 단위 → 정규화 필요)
function scoreOnePerson(pose,idx){
  const W=canvas.width,H=canvas.height;
  if(!W||!H)return;

  // 픽셀→정규화 (0~1)
  const kp=pose.keypoints.map(k=>({
    x:k.x/W, y:k.y/H, score:k.score||0
  }));

  const ls=kp[KP.leftShoulder], rs=kp[KP.rightShoulder];
  const lw=kp[KP.leftWrist],   rw=kp[KP.rightWrist];
  const lh=kp[KP.leftHip],     rh=kp[KP.rightHip];
  const lk=kp[KP.leftKnee],    rk=kp[KP.rightKnee];
  const la=kp[KP.leftAnkle],   ra=kp[KP.rightAnkle];

  if(ls.score<0.3||rs.score<0.3)return;

  // 1. 자세 (3.5점)
  const lArm=dist(ls,lw), rArm=dist(rs,rw);
  const sym=1-Math.min(Math.abs(lArm-rArm),0.3)/0.3;
  const wDiff=Math.abs(lw.y-rw.y);
  const post=Math.min((sym*0.5+(lArm+rArm)*2*0.3+Math.max(0,1-wDiff*4)*0.2)*3.5,3.5);

  // 2. 서기 (2.0점)
  const lKA=angle3(lh,lk,la), rKA=angle3(rh,rk,ra), avgK=(lKA+rKA)/2;
  const stance=avgK>=120&&avgK<=150?2.0:avgK>=90?1.8:Math.max(0,2.0-Math.abs(avgK-135)/40);

  // 3. 균형 (2.0점)
  const bal=Math.max(0,2.0-(Math.abs(ls.y-rs.y)*6+Math.abs(lh.y-rh.y)*4));

  // 4. 파워 (2.5점) — 움직임 있을 때만 갱신
  let power=lastScore[idx].power;
  if(prevLM[idx]){
    const pW=canvas.width, pH=canvas.height;
    const plw={x:prevLM[idx].keypoints[KP.leftWrist].x/pW,  y:prevLM[idx].keypoints[KP.leftWrist].y/pH};
    const prw={x:prevLM[idx].keypoints[KP.rightWrist].x/pW, y:prevLM[idx].keypoints[KP.rightWrist].y/pH};
    const plk={x:prevLM[idx].keypoints[KP.leftKnee].x/pW,   y:prevLM[idx].keypoints[KP.leftKnee].y/pH};
    const prk={x:prevLM[idx].keypoints[KP.rightKnee].x/pW,  y:prevLM[idx].keypoints[KP.rightKnee].y/pH};
    const motion=dist(lw,plw)+dist(rw,prw)+dist(lk,plk)*0.5+dist(rk,prk)*0.5;
    if(motion>0.01){
      power=Math.min(motion*12,2.5);
      lastScore[idx].power=power;
      framesSinceMotion[idx]=0;
    }else{
      framesSinceMotion[idx]++;
    }
  }
  prevLM[idx]=pose;

  // 스무딩
  const sm=0.12;
  lastScore[idx].post   =lastScore[idx].post   *(1-sm)+post   *sm;
  lastScore[idx].stance =lastScore[idx].stance *(1-sm)+stance *sm;
  lastScore[idx].balance=lastScore[idx].balance*(1-sm)+bal    *sm;

  scoreAccum[idx].post.push(lastScore[idx].post);
  scoreAccum[idx].stance.push(lastScore[idx].stance);
  scoreAccum[idx].balance.push(lastScore[idx].balance);
  scoreAccum[idx].power.push(power);
  ['post','stance','balance','power'].forEach(k=>{
    if(scoreAccum[idx][k].length>90)scoreAccum[idx][k].shift();
  });
}

function updateScoreUI(){
  [0,1].forEach(idx=>{
    const a=scoreAccum[idx];
    if(!a.post.length)return;
    const p=avg(a.post).toFixed(1),s=avg(a.stance).toFixed(1);
    const b=avg(a.balance).toFixed(1),pw=avg(a.power).toFixed(1);
    const total=(+p+ +s+ +b+ +pw).toFixed(1);
    document.getElementById(`score${idx}`).textContent=total;
    document.getElementById(`i${idx}_0`).textContent=p;
    document.getElementById(`i${idx}_1`).textContent=s;
    document.getElementById(`i${idx}_2`).textContent=b;
    document.getElementById(`i${idx}_3`).textContent=pw;
  });
  const s0=parseFloat(document.getElementById('score0').textContent)||0;
  const s1=parseFloat(document.getElementById('score1').textContent)||0;
  if(s0>0||s1>0){
    if(s0>s1) setResult(`🔵 청 코너 우세! (${s0} vs ${s1})`);
    else if(s1>s0) setResult(`🔴 홍 코너 우세! (${s1} vs ${s0})`);
    else setResult(`⚔️ 동점! (${s0})`);
  }
}

function lockPositions(){
  document.getElementById('lock-overlay').style.display='none';
  setPhase('locked');
  setResult('📌 위치 고정! 측정 시작 버튼을 누르세요');
  document.getElementById('recordBtn').classList.add('active');
}

function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);}
function angle3(a,b,c){
  if(a.score<0.2||b.score<0.2||c.score<0.2)return 135;
  const ab={x:a.x-b.x,y:a.y-b.y},cb={x:c.x-b.x,y:c.y-b.y};
  const dot=ab.x*cb.x+ab.y*cb.y;
  const mag=Math.sqrt((ab.x**2+ab.y**2)*(cb.x**2+cb.y**2));
  return mag===0?135:Math.acos(Math.max(-1,Math.min(1,dot/mag)))*180/Math.PI;
}
function avg(arr){return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;}

function updateBadges(left,right){
  const bl=document.getElementById('badgeLeft');
  const br=document.getElementById('badgeRight');
  bl.textContent=left?'🔵 청 인식됨':'🔵 청 대기';
  bl.className='detect-badge blue'+(left?' found':'');
  br.textContent=right?'🔴 홍 인식됨':'🔴 홍 대기';
  br.className='detect-badge red'+(right?' found':'');
}

function setPhase(p){
  phase=p;
  document.getElementById('phase0').className='phase-step'+(p!=='loading'?' done':' active');
  document.getElementById('phase1').className='phase-step'+(p==='detecting'?' active':p==='locked'||p==='recording'?' done':'');
  document.getElementById('phase2').className='phase-step'+(p==='locked'?' active':p==='recording'?' done':'');
  document.getElementById('phase3').className='phase-step'+(p==='recording'?' active':'');
}

function toggleRecord(){
  if(phase!=='locked'&&phase!=='recording')return;
  isRecording=!isRecording;
  phase=isRecording?'recording':'locked';
  setPhase(phase);
  const btn=document.getElementById('recordBtn');
  btn.textContent=isRecording?'🛑 측정 종료':'⚔️ 측정 시작';
  btn.classList.toggle('recording',isRecording);
  if(isRecording){
    scoreAccum=[{post:[],stance:[],balance:[],power:[]},{post:[],stance:[],balance:[],power:[]}];
    lastScore=[{post:2.0,stance:1.5,balance:1.5,power:0.5},{post:2.0,stance:1.5,balance:1.5,power:0.5}];
    setResult('⚔️ 측정 중...');
  }else{
    const s0=parseFloat(document.getElementById('score0').textContent)||0;
    const s1=parseFloat(document.getElementById('score1').textContent)||0;
    if(s0>s1) setResult(`🏆 최종 결과 — 🔵 청 코너 승! (${s0} vs ${s1})`);
    else if(s1>s0) setResult(`🏆 최종 결과 — 🔴 홍 코너 승! (${s1} vs ${s0})`);
    else setResult(`🏆 최종 결과 — 동점! (${s0})`);
  }
}

function resetAll(){
  isRecording=false;phase='detecting';
  detectedLeft=false;detectedRight=false;
  scoreAccum=[{post:[],stance:[],balance:[],power:[]},{post:[],stance:[],balance:[],power:[]}];
  lastScore=[{post:2.0,stance:1.5,balance:1.5,power:0.5},{post:2.0,stance:1.5,balance:1.5,power:0.5}];
  prevLM=[null,null];framesSinceMotion=[0,0];
  [0,1].forEach(idx=>{
    document.getElementById(`score${idx}`).textContent='-';
    ['0','1','2','3'].forEach(j=>document.getElementById(`i${idx}_${j}`).textContent='-');
  });
  document.getElementById('recordBtn').textContent='⚔️ 측정 시작';
  document.getElementById('recordBtn').classList.remove('recording','active');
  document.getElementById('lock-overlay').style.display='none';
  updateBadges(false,false);
  setPhase('detecting');
  setResult('① 두 선수가 화면 좌우에 서주세요');
}

function setStatus(t,s){
  document.getElementById('statusText').innerHTML=t.replace(/\n/,'<br>');
  document.getElementById('statusSub').textContent=s;
}
function setResult(t){document.getElementById('resultBar').textContent=t;}

init();
</script>
</body>
</html>
