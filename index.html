<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 심판 - 디버깅 모드</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#080c14;color:#fff;font-family:'Noto Sans KR',sans-serif;}
        .wrap{display:flex;flex-direction:column;align-items:center;padding:15px;gap:10px;}
        .camera-box{position:relative;width:100%;max-width:500px;aspect-ratio:4/3;background:#000;border-radius:15px;overflow:hidden;}
        #video{width:100%;height:100%;object-fit:cover;}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
        #log{width:100%;max-width:500px;background:#222;padding:10px;font-size:12px;color:#4ade80;border-radius:10px;height:100px;overflow-y:auto;border:1px solid #444;}
        .score-board{display:flex;gap:10px;width:100%;max-width:500px;}
        .panel{flex:1;background:#1e293b;padding:15px;border-radius:10px;text-align:center;}
        .avg-score{font-size:32px;font-family:'Black Han Sans',sans-serif;color:#fbbf24;}
        .btn{width:100%;max-width:500px;padding:15px;background:#4f46e5;color:#fff;border:none;border-radius:10px;font-family:'Black Han Sans',sans-serif;font-size:18px;}
    </style>
</head>
<body>

<div class="wrap">
    <h2 style="font-family:'Black Han Sans'">🥋 2인 대결 디버깅 모드</h2>
    
    <div id="log">시스템 로그 기다리는 중...</div>

    <div class="camera-box">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="score-board">
        <div class="panel" style="border-bottom:4px solid #3b82f6">
            <div style="font-size:12px">청 (LEFT)</div>
            <div class="avg-score" id="score0">0.0</div>
        </div>
        <div class="panel" style="border-bottom:4px solid #ef4444">
            <div style="font-size:12px">홍 (RIGHT)</div>
            <div class="avg-score" id="score1">0.0</div>
        </div>
    </div>

    <button class="btn" id="startBtn">측정 시작</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0"></script>

<script>
    const logBox = document.getElementById('log');
    function addLog(msg) {
        const t = new Date().toLocaleTimeString();
        logBox.innerHTML += `<div>[${t}] ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    let poseLandmarker;
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    let isRecording = false;
    let cumulativeScores = [[], []];

    // 1. 카메라 시작
    async function startCamera() {
        addLog("1. 카메라 연결 시도 중...");
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
            addLog("✅ 카메라 연결 성공!");
            initAI();
        } catch (err) {
            addLog("❌ 카메라 에러: " + err.name);
            alert("카메라 권한을 허용해주세요!");
        }
    }

    // 2. AI 초기화
    async function initAI() {
        addLog("2. AI 라이브러리 준비 중...");
        try {
            const vision = await mediapipe.tasksVision.FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
            );
            addLog("✅ WASM 로드 완료!");

            poseLandmarker = await mediapipe.tasksVision.PoseLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task`,
                    delegate: "CPU"
                },
                runningMode: "VIDEO",
                numPoses: 2
            });
            addLog("✅ AI 모델 로드 완료! 이제 분석을 시작합니다.");
            predictWebcam();
        } catch (err) {
            addLog("❌ AI 엔진 로드 에러: " + err.message);
        }
    }

    async function predictWebcam() {
        if (poseLandmarker && video.readyState >= 2) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const results = poseLandmarker.detectForVideo(video, performance.now());
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (results.landmarks && results.landmarks.length > 0) {
                const sorted = results.landmarks.sort((a,b) => a[0].x - b[0].x);
                sorted.forEach((lm, idx) => {
                    if(idx > 1) return;
                    drawPose(lm, idx === 0 ? "#3b82f6" : "#ef4444");
                    if(isRecording) {
                        const score = calculateScore(lm);
                        cumulativeScores[idx].push(score);
                        document.getElementById(`score${idx}`).textContent = 
                            (cumulativeScores[idx].reduce((a,b)=>a+b,0)/cumulativeScores[idx].length).toFixed(1);
                    }
                });
            }
        }
        requestAnimationFrame(predictWebcam);
    }

    function drawPose(lms, color) {
        ctx.fillStyle = color;
        lms.forEach(pt => {
            ctx.beginPath();
            ctx.arc(pt.x * canvas.width, pt.y * canvas.height, 3, 0, 2*Math.PI);
            ctx.fill();
        });
    }

    function calculateScore(lm) {
        // 무릎 각도 간단 계산 (마스터님의 기존 로직 유지)
        const hip = lm[23], knee = lm[25], ankle = lm[27];
        if(!hip || !knee || !ankle) return 7.0;
        const angle = Math.abs((Math.atan2(ankle.y - knee.y, ankle.x - knee.x) - Math.atan2(hip.y - knee.y, hip.x - knee.x)) * 180 / Math.PI);
        return (angle > 115 && angle < 155) ? (8.5 + Math.random()) : (7.5 + Math.random());
    }

    document.getElementById('startBtn').onclick = () => {
        isRecording = !isRecording;
        document.getElementById('startBtn').textContent = isRecording ? "🛑 측정 종료" : "⚔️ 측정 시작";
        if(isRecording) cumulativeScores = [[], []];
    };

    startCamera();
</script>
</body>
</html>
