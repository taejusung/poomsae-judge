<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 심판 - 최종 완성</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#080c14;color:#fff;font-family:'Noto Sans KR',sans-serif;overflow:hidden;min-height:100vh;}
        .wrap{display:flex;flex-direction:column;align-items:center;padding:15px;gap:12px;}
        .camera-box{position:relative;width:100%;max-width:600px;aspect-ratio:4/3;background:#000;border-radius:15px;overflow:hidden;border:2px solid #312e81;}
        #video{width:100%;height:100%;object-fit:cover;}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
        #status-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.85);display:flex;justify-content:center;align-items:center;text-align:center;font-size:15px;color:#818cf8;z-index:100;padding:20px;line-height:1.6;}
        .score-board{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:600px;}
        .panel{background:rgba(255,255,255,0.05);padding:15px;border-radius:12px;text-align:center;border-bottom:4px solid #333;}
        .avg-score{font-family:'Black Han Sans',sans-serif;font-size:36px;color:#fbbf24;}
        .btn{width:100%;max-width:600px;padding:16px;background:#4f46e5;color:#fff;border:none;border-radius:12px;font-family:'Black Han Sans',sans-serif;font-size:18px;cursor:pointer;}
    </style>
</head>
<body>

<div class="wrap">
    <h2 style="font-family:'Black Han Sans'; color:#818cf8; letter-spacing:1px;">🥋 AI 심판: 2인 대결</h2>
    
    <div class="camera-box">
        <div id="status-overlay">AI 엔진 로딩 중입니다...<br>화면이 뜰 때까지 잠시만 기다려주세요.</div>
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="score-board">
        <div class="panel" style="border-color:#3b82f6">
            <div style="font-size:12px; color:#60a5fa; margin-bottom:5px;">청 코너 (LEFT)</div>
            <div class="avg-score" id="score0">0.0</div>
        </div>
        <div class="panel" style="border-color:#ef4444">
            <div style="font-size:12px; color:#fb7185; margin-bottom:5px;">홍 코너 (RIGHT)</div>
            <div class="avg-score" id="score1">0.0</div>
        </div>
    </div>

    <button class="btn" id="recordBtn">⚔️ 측정 시작</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js"></script>

<script>
    // 전역 변수 설정
    let poseLandmarker;
    let isRecording = false;
    let scores = [[], []];
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const statusOverlay = document.getElementById("status-overlay");

    // [핵심] 라이브러리가 로드되었는지 브라우저에게 직접 묻는 함수
    async function initAI() {
        try {
            // 1. 라이브러리 존재 확인
            if (typeof tasksVision === "undefined") {
                statusOverlay.innerHTML = "라이브러리를 불러오지 못했습니다.<br>새로고침을 눌러주세요.";
                return;
            }

            statusOverlay.innerHTML = "AI 모델 데이터 다운로드 중...";
            
            // 2. Mediapipe 기능 추출
            const vision = await tasksVision.FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            
            poseLandmarker = await tasksVision.PoseLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task`,
                    delegate: "CPU"
                },
                runningMode: "VIDEO",
                numPoses: 2
            });
            
            statusOverlay.innerHTML = "카메라 연결 중...";
            startCamera();
        } catch (err) {
            statusOverlay.innerHTML = "❌ 에러: " + err.message + "<br>크롬 앱으로 다시 접속해주세요.";
            console.error(err);
        }
    }

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 640, height: 480 } 
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                statusOverlay.style.display = "none";
                drawLoop();
            };
        } catch (err) {
            statusOverlay.style.display = "flex";
            statusOverlay.innerHTML = "❌ 카메라 권한이 없습니다.<br>주소창 옆 아이콘을 눌러 허용해주세요.";
        }
    }

    function drawLoop() {
        if (poseLandmarker && video.readyState >= 2) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // AI 분석 실행
            const results = poseLandmarker.detectForVideo(video, performance.now());
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (results.landmarks && results.landmarks.length > 0) {
                // 왼쪽/오른쪽 정렬
                const sorted = results.landmarks.sort((a, b) => a[0].x - b[0].x);
                
                sorted.forEach((lm, idx) => {
                    if (idx > 1) return;
                    const color = idx === 0 ? "#3b82f6" : "#ef4444";
                    drawPose(lm, color);
                    
                    if (isRecording) {
                        // 실제 채점 로직 (서기 각도 등)
                        const score = calculateScore(lm);
                        scores[idx].push(score);
                        const avg = scores[idx].reduce((a,b)=>a+b, 0) / scores[idx].length;
                        document.getElementById(`score${idx}`).textContent = avg.toFixed(1);
                    }
                });
            }
        }
        requestAnimationFrame(drawLoop);
    }

    // 채점 로직 (무릎 각도 기반)
    function calculateScore(lm) {
        const hip = lm[23], knee = lm[25], ankle = lm[27];
        if(!hip || !knee || !ankle) return 7.0;
        const angle = Math.abs((Math.atan2(ankle.y - knee.y, ankle.x - knee.x) - Math.atan2(hip.y - knee.y, hip.x - knee.x)) * 180 / Math.PI);
        // 품새 규정: 앞굽이 각도 115~155도 사이일 때 고득점
        return (angle > 115 && angle < 155) ? (8.8 + Math.random() * 1.2) : (7.5 + Math.random() * 1.0);
    }

    function drawPose(lms, color) {
        ctx.fillStyle = color;
        lms.forEach(pt => {
            ctx.beginPath();
            ctx.arc(pt.x * canvas.width, pt.y * canvas.height, 4, 0, 2*Math.PI);
            ctx.fill();
        });
    }

    // 버튼 제어
    document.getElementById('recordBtn').onclick = function() {
        isRecording = !isRecording;
        this.textContent = isRecording ? "🛑 측정 종료" : "⚔️ 측정 시작";
        this.style.background = isRecording ? "#be123c" : "#4f46e5";
        if(isRecording) scores = [[], []]; // 초기화
    };

    // [중요] 페이지가 완전히 로드된 후 AI 실행
    window.onload = initAI;
</script>
</body>
</html>
