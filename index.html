<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>품새 AI 심판 - 2인 대결 모드</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#080c14;color:#fff;font-family:'Noto Sans KR',sans-serif;overflow-x:hidden;min-height:100vh;}
        .wrap{display:flex;flex-direction:column;align-items:center;padding:15px;gap:12px;}
        .title{font-family:'Black Han Sans',sans-serif;font-size:24px;background:linear-gradient(90deg,#818cf8,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        
        .camera-container{position:relative;width:100%;max-width:640px;aspect-ratio:4/3;border-radius:15px;overflow:hidden;border:2px solid #312e81;background:#000;}
        #video{width:100%;height:100%;object-fit:cover;display:block;}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;}

        .score-board{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:640px;}
        .panel{padding:15px;border-radius:12px;text-align:center;background:rgba(255,255,255,0.05);border-bottom:4px solid #333;}
        .blue{border-color:#1d4ed8;} .red{border-color:#be123c;}
        .panel-name{font-family:'Black Han Sans',sans-serif;font-size:16px;margin-bottom:5px;}
        .avg-score{font-family:'Black Han Sans',sans-serif;font-size:36px;color:#fbbf24;}
        
        .controls{display:flex;gap:10px;width:100%;max-width:640px;}
        .btn{flex:1;padding:12px;border-radius:10px;border:none;font-family:'Black Han Sans',sans-serif;font-size:16px;cursor:pointer;transition:0.2s;}
        .btn-start{background:#059669;color:#fff;}
        .btn-stop{background:#dc2626;color:#fff;}
        .btn-reset{background:#4b5563;color:#fff;}
        #loading-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.8);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:100;font-size:14px;color:#818cf8;gap:10px;}
    </style>
</head>
<body>

<div class="wrap">
    <div class="title">🥋 품새 AI 심판: 2인 대결</div>

    <div class="camera-container">
        <div id="loading-overlay">
            <div style="font-size: 18px; font-weight: bold;">AI 시스템 준비 중...</div>
            <div id="status-detail">카메라 권한을 확인하고 있습니다.</div>
        </div>
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="score-board">
        <div class="panel blue">
            <div class="panel-name" style="color:#60a5fa">청 코너 (LEFT)</div>
            <div class="avg-score" id="score0">0.0</div>
        </div>
        <div class="panel red">
            <div class="panel-name" style="color:#fb7185">홍 코너 (RIGHT)</div>
            <div class="avg-score" id="score1">0.0</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-start" id="startBtn" onclick="startRecording()">⚔️ 측정 시작</button>
        <button class="btn btn-stop" id="stopBtn" onclick="stopRecording()" style="display:none;">🛑 측정 종료</button>
        <button class="btn btn-reset" onclick="location.reload()">🔄 초기화</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/vision_bundle.js"></script>
<script>
let poseLandmarker;
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const statusDetail = document.getElementById("status-detail");
let isRecording = false;
let cumulativeScores = [[], []];

// 1. 카메라 시작 (후면 카메라 environment 고정)
async function startCamera() {
    try {
        statusDetail.textContent = "후면 카메라를 연결하는 중...";
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { 
                facingMode: "environment", // 후면 카메라로 고정
                width: { ideal: 640 },
                height: { ideal: 480 }
            } 
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            video.play();
            initAI(); 
        };
    } catch (err) {
        statusDetail.textContent = "카메라 로드 실패: " + err.message;
        console.error(err);
    }
}

// 2. AI 초기화 (WASM 경로 및 모델 최적화)
async function initAI() {
    try {
        statusDetail.textContent = "AI 분석 엔진을 로드하고 있습니다...";
        const vision = await FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
        );
        poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
            baseOptions: { 
                modelAssetPath: `https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task`,
                delegate: "GPU" 
            },
            runningMode: "VIDEO",
            numPoses: 2 
        });
        document.getElementById("loading-overlay").style.display = "none";
        predictWebcam();
    } catch (err) {
        statusDetail.textContent = "AI 엔진 로드 실패. 다시 시도해주세요.";
        console.error(err);
    }
}

function startRecording() {
    isRecording = true;
    cumulativeScores = [[], []];
    document.getElementById("startBtn").style.display = "none";
    document.getElementById("stopBtn").style.display = "block";
}

function stopRecording() {
    isRecording = false;
    document.getElementById("startBtn").style.display = "block";
    document.getElementById("stopBtn").style.display = "none";
}

async function predictWebcam() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    
    if (poseLandmarker && video.readyState >= 2) {
        const results = await poseLandmarker.detectForVideo(video, performance.now());
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (results.landmarks && results.landmarks.length > 0) {
            // X좌표 기준 왼쪽은 0번(청), 오른쪽은 1번(홍)
            const sortedPoses = results.landmarks.sort((a, b) => a[0].x - b[0].x);
            
            sortedPoses.forEach((landmark, index) => {
                if (index > 1) return;
                const color = index === 0 ? "#60a5fa" : "#fb7185";
                drawPose(landmark, color);
                
                if (isRecording) {
                    const frameScore = calculateScore(landmark);
                    cumulativeScores[index].push(frameScore);
                    updateDisplay(index);
                }
            });
        }
    }
    window.requestAnimationFrame(predictWebcam);
}

function calculateScore(lm) {
    const hip = lm[23], knee = lm[25], ankle = lm[27];
    if(!hip || !knee || !ankle) return 7.0;
    const angle = Math.abs((Math.atan2(ankle.y - knee.y, ankle.x - knee.x) - Math.atan2(hip.y - knee.y, hip.x - knee.x)) * 180 / Math.PI);
    return (angle > 115 && angle < 155) ? (9.0 + Math.random()) : (7.5 + Math.random());
}

function updateDisplay(idx) {
    const scores = cumulativeScores[idx];
    if (scores.length === 0) return;
    const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
    document.getElementById(`score${idx}`).textContent = avg.toFixed(1);
}

function drawPose(landmarks, color) {
    ctx.fillStyle = color;
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    landmarks.forEach(pt => {
        ctx.beginPath();
        ctx.arc(pt.x * canvas.width, pt.y * canvas.height, 3, 0, 2 * Math.PI);
        ctx.fill();
    });
}

startCamera();
</script>
</body>
</html>
