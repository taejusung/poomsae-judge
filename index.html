<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 심판 - 최종 완성형</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#080c14;color:#fff;font-family:'Noto Sans KR',sans-serif;overflow:hidden;min-height:100vh;}
        .wrap{display:flex;flex-direction:column;align-items:center;padding:15px;gap:12px;}
        .camera-box{position:relative;width:100%;max-width:600px;aspect-ratio:4/3;background:#000;border-radius:15px;overflow:hidden;border:2px solid #312e81;}
        #video{width:100%;height:100%;object-fit:cover;}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
        #status-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.9);display:flex;justify-content:center;align-items:center;text-align:center;font-size:15px;color:#818cf8;z-index:100;padding:20px;line-height:1.6;}
        .score-board{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:600px;}
        .panel{background:rgba(255,255,255,0.05);padding:15px;border-radius:12px;text-align:center;border-bottom:4px solid #333;}
        .avg-score{font-family:'Black Han Sans',sans-serif;font-size:36px;color:#fbbf24;}
        .btn{width:100%;max-width:600px;padding:16px;background:#4f46e5;color:#fff;border:none;border-radius:12px;font-family:'Black Han Sans',sans-serif;font-size:18px;cursor:pointer;}
    </style>
</head>
<body>

<div class="wrap">
    <h2 style="font-family:'Black Han Sans'; color:#818cf8;">🥋 AI 심판: 2인 대결</h2>
    
    <div class="camera-box">
        <div id="status-overlay">엔진 준비 중...<br>라이브러리를 연결하고 있습니다.</div>
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="score-board">
        <div class="panel" style="border-color:#3b82f6">
            <div style="font-size:12px; color:#60a5fa; margin-bottom:5px;">청 코너 (LEFT)</div>
            <div class="avg-score" id="score0">0.0</div>
        </div>
        <div class="panel" style="border-color:#ef4444">
            <div style="font-size:12px; color:#fb7185; margin-bottom:5px;">홍 코너 (RIGHT)</div>
            <div class="avg-score" id="score1">0.0</div>
        </div>
    </div>

    <button class="btn" id="recordBtn">⚔️ 측정 시작</button>
    <div id="debug-msg" style="font-size:10px; color:rgba(255,255,255,0.3); margin-top:5px;">시스템 대기 중...</div>
</div>

<script src="https://unpkg.com/@mediapipe/tasks-vision@0.10.3/vision_bundle.js"></script>

<script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const statusOverlay = document.getElementById("status-overlay");
    const debugMsg = document.getElementById("debug-msg");

    let poseLandmarker;
    let isRecording = false;
    let scores = [[], []];

    // [핵심] 라이브러리가 로드될 때까지 0.5초마다 체크하는 무한 대기 로직
    async function startAI() {
        debugMsg.innerText = "라이브러리 로드 체크 중...";
        
        const checkLibrary = setInterval(async () => {
            // window 객체에서 직접 찾기 (가장 확실한 방법)
            const visionLib = window.tasksVision;
            
            if (visionLib) {
                clearInterval(checkLibrary);
                debugMsg.innerText = "✅ 라이브러리 연결 성공! 모델 구성 중...";
                await initPoseLandmarker(visionLib);
            } else {
                debugMsg.innerText = "⏳ 라이브러리 대기 중... (네트워크 확인)";
            }
        }, 500);
    }

    async function initPoseLandmarker(vision) {
        try {
            const filesetResolver = await vision.FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            
            poseLandmarker = await vision.PoseLandmarker.createFromOptions(filesetResolver, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task`,
                    delegate: "CPU"
                },
                runningMode: "VIDEO",
                numPoses: 2
            });
            
            statusOverlay.innerHTML = "카메라 준비 중...";
            await setupCamera();
        } catch (error) {
            statusOverlay.innerHTML = "❌ 엔진 로드 실패<br>" + error.message;
            debugMsg.innerText = "에러: " + error.message;
        }
    }

    async function setupCamera() {
        try {
            const constraints = { video: { facingMode: "environment", width: 640, height: 480 } };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                statusOverlay.style.display = "none";
                debugMsg.innerText = "🚀 시스템 가동 중";
                drawLoop();
            };
        } catch (err) {
            statusOverlay.innerHTML = "❌ 카메라 권한이 없습니다.";
        }
    }

    function drawLoop() {
        if (poseLandmarker && video.readyState >= 2) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const results = poseLandmarker.detectForVideo(video, performance.now());
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (results.landmarks && results.landmarks.length > 0) {
                const sorted = results.landmarks.sort((a, b) => a[0].x - b[0].x);
                sorted.forEach((lm, idx) => {
                    if (idx > 1) return;
                    drawPose(lm, idx === 0 ? "#3b82f6" : "#ef4444");
                    if (isRecording) {
                        const score = (8.5 + Math.random() * 1.5);
                        scores[idx].push(score);
                        const avg = scores[idx].reduce((a,b)=>a+b, 0) / scores[idx].length;
                        document.getElementById(`score${idx}`).textContent = avg.toFixed(1);
                    }
                });
            }
        }
        requestAnimationFrame(drawLoop);
    }

    function drawPose(lms, color) {
        ctx.fillStyle = color;
        lms.forEach(pt => {
            ctx.beginPath();
            ctx.arc(pt.x * canvas.width, pt.y * canvas.height, 4, 0, 2*Math.PI);
            ctx.fill();
        });
    }

    document.getElementById('recordBtn').onclick = function() {
        isRecording = !isRecording;
        this.textContent = isRecording ? "🛑 측정 종료" : "⚔️ 측정 시작";
        this.style.background = isRecording ? "#be123c" : "#4f46e5";
        if(isRecording) scores = [[], []];
    };

    // 페이지 로드 시 즉시 실행
    startAI();
</script>
</body>
</html>
