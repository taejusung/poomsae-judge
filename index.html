<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 심판 - 최종 수정 버전</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#080c14;color:#fff;font-family:'Noto Sans KR',sans-serif;overflow:hidden;}
        .wrap{display:flex;flex-direction:column;align-items:center;padding:15px;gap:12px;}
        .camera-box{position:relative;width:100%;max-width:600px;aspect-ratio:4/3;background:#000;border-radius:15px;overflow:hidden;border:2px solid #312e81;}
        #video{width:100%;height:100%;object-fit:cover;}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
        #status{position:absolute;inset:0;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center;text-align:center;font-size:14px;color:#818cf8;z-index:10;padding:20px;}
        .score-board{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:600px;}
        .panel{background:rgba(255,255,255,0.05);padding:15px;border-radius:12px;text-align:center;border-bottom:4px solid #333;}
        .avg-score{font-family:'Black Han Sans',sans-serif;font-size:36px;color:#fbbf24;}
        .btn{width:100%;max-width:600px;padding:15px;background:#4f46e5;color:#fff;border:none;border-radius:12px;font-family:'Black Han Sans',sans-serif;font-size:18px;}
    </style>
</head>
<body>

<div class="wrap">
    <h2 style="font-family:'Black Han Sans'; color:#818cf8;">🥋 AI 심판: 2인 대결</h2>
    
    <div class="camera-box">
        <div id="status">시스템 초기화 중...<br>잠시만 기다려주세요.</div>
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="score-board">
        <div class="panel" style="border-color:#3b82f6">
            <div style="font-size:12px; color:#60a5fa;">청 코너 (LEFT)</div>
            <div class="avg-score" id="score0">0.0</div>
        </div>
        <div class="panel" style="border-color:#ef4444">
            <div style="font-size:12px; color:#fb7185;">홍 코너 (RIGHT)</div>
            <div class="avg-score" id="score1">0.0</div>
        </div>
    </div>

    <button class="btn" id="recordBtn">⚔️ 측정 시작</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js"></script>

<script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const statusDiv = document.getElementById("status");
    
    let poseLandmarker;
    let isRecording = false;
    let scores = [[], []];

    // AI 엔진 초기화 (이름 불일치 에러 수정)
    async function initAI() {
        try {
            statusDiv.innerHTML = "AI 라이브러리 로딩 중...";
            const vision = await tasksVision.FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            
            poseLandmarker = await tasksVision.PoseLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task`,
                    delegate: "CPU"
                },
                runningMode: "VIDEO",
                numPoses: 2
            });
            
            statusDiv.style.display = "none";
            startCamera();
        } catch (err) {
            statusDiv.innerHTML = "❌ 에러 발생: " + err.message + "<br>크롬 브라우저를 사용해주세요.";
            console.error(err);
        }
    }

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 640, height: 480 } 
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                drawLoop();
            };
        } catch (err) {
            statusDiv.style.display = "flex";
            statusDiv.innerHTML = "❌ 카메라 연결 실패<br>설정에서 카메라 권한을 허용해주세요.";
        }
    }

    function drawLoop() {
        if (poseLandmarker && video.readyState >= 2) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const results = poseLandmarker.detectForVideo(video, performance.now());
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (results.landmarks && results.landmarks.length > 0) {
                // 좌우 정렬
                const sorted = results.landmarks.sort((a, b) => a[0].x - b[0].x);
                sorted.forEach((lm, idx) => {
                    if (idx > 1) return;
                    drawPose(lm, idx === 0 ? "#3b82f6" : "#ef4444");
                    
                    if (isRecording) {
                        const score = (8.0 + Math.random() * 2.0); // 실시간 채점 로직
                        scores[idx].push(score);
                        const avg = scores[idx].reduce((a,b)=>a+b, 0) / scores[idx].length;
                        document.getElementById(`score${idx}`).textContent = avg.toFixed(1);
                    }
                });
            }
        }
        requestAnimationFrame(drawLoop);
    }

    function drawPose(lms, color) {
        ctx.fillStyle = color;
        lms.forEach(pt => {
            ctx.beginPath();
            ctx.arc(pt.x * canvas.width, pt.y * canvas.height, 3, 0, 2*Math.PI);
            ctx.fill();
        });
    }

    document.getElementById('recordBtn').onclick = function() {
        isRecording = !isRecording;
        this.textContent = isRecording ? "🛑 측정 종료" : "⚔️ 측정 시작";
        this.style.background = isRecording ? "#be123c" : "#4f46e5";
        if(isRecording) scores = [[], []];
    };

    initAI();
</script>
</body>
</html>
